  - class_name: "verl.experimental.opd_mm.tools.OPDTopKTool"
    config: *opd_mm_common_config
  - class_name: "verl.experimental.opd_mm.tools.OPDRetrieveTool"
    config: *opd_mm_common_config
  - class_name: "verl.experimental.opd_mm.tools.OPDExpandNeighborsTool"
    config: *opd_mm_common_config
  - class_name: "verl.experimental.opd_mm.tools.OPDInspectRawTool"
    config: *opd_mm_common_config
  - class_name: "verl.experimental.opd_mm.tools.OPDStopTool"
    config: *opd_mm_common_config
