opd_mm_common_config: &opd_mm_common_config
  type: native
  vector_store_dir: dataset/mem_gallery/opd_mm_store
  dense_model_path: /home/miaofy/data/pretrained_models/all-MiniLM-L6-v2
  vision_model_path: /home/miaofy/data/pretrained_models/SigLIP-Base-Patch16-384
  hybrid_model_path: /home/miaofy/data/pretrained_models/gme-Qwen2-VL-2B-Instruct
  vector_device: cuda:0
  raw_inspector_backend: teacher
  raw_inspector_max_tokens: 256
  raw_inspector_temperature: 0.0

tools:
